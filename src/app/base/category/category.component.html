<div class="absolute flex top-1.5 right-1.5 z-30 gap-1">
    <div (click)="onOrderChange('asc')" [ngClass]="{'!text-[#47aee1]': activeOrder() === 'asc'}"
        class="flex text-gray-300 rounded-md px-2 py-1.5 hover:bg-[#bad5ff70] hover:text-white cursor-pointer default-transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="size-5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 4.5h14.25M3 9h9.75M3 13.5h5.25m5.25-.75L17.25 9m0 0L21 12.75M17.25 9v12" />
        </svg>
    </div>
    <div (click)="onOrderChange('dec')" [ngClass]="{'!text-[#47aee1]': activeOrder() === 'dec'}"
        class="flex text-gray-300 rounded-md px-2 py-1.5 hover:bg-[#bad5ff70] hover:text-white cursor-pointer default-transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="size-5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 4.5h14.25M3 9h9.75M3 13.5h9.75m4.5-4.5v12m0 0-3.75-3.75M17.25 21 21 17.25" />
        </svg>
    </div>
    <div (click)="onOrderChange('copy')" [ngClass]="{'!text-[#47aee1]': activeOrder() === 'copy'}"
        class="flex text-gray-300 rounded-md px-2 py-1.5 hover:bg-[#bad5ff70] hover:text-white cursor-pointer default-transition">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="size-5">
